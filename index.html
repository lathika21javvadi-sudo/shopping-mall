<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sarath City Center Mall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; }
    header { background: #222; color: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { margin: 0; font-size: 24px; }
    nav a { color: #fff; text-decoration: none; margin-left: 15px; font-size: 14px; }
    .section { padding: 40px 30px; max-width: 1100px; margin: 20px auto; background: #fff; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
    .section h3 { margin-top: 0; margin-bottom: 20px; font-size: 22px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .stores-grid, .offers-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
    .card { background: #fafafa; border-radius: 4px; padding: 15px; border: 1px solid #eee; }
    .card h4 { margin: 0 0 8px; }
    .card p { margin: 0; font-size: 14px; color: #555; }
    ul { padding-left: 20px; }
  </style>
</head>
<body>

  <header>
    <h1>Sarath City Center Mall</h1>
    <nav>
      <a href="#stores">Stores</a>
      <a href="#dining">Dining</a>
      <a href="#cinema">Cinema</a>
      <a href="#offers">Offers</a>
    </nav>
  </header>

  <section id="stores" class="section">
    <h3>Featured Stores</h3>
    <div id="store-list" class="stores-grid"></div>
  </section>

  <section id="dining" class="section">
    <h3>Dining & Cafés</h3>
    <div id="dining-list"></div>
  </section>

  <section id="cinema" class="section">
    <h3>Cinema Schedule</h3>
    <ul id="cinema-list"></ul>
  </section>

  <section id="offers" class="section">
    <h3>Latest Offers</h3>
    <div id="offers-list" class="offers-grid"></div>
  </section>

  <script>
    const API_BASE = "http://<13.60.229.196>:5000";

    // Load stores
    fetch(API_BASE + "/stores")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("store-list");
        container.innerHTML = data.stores
          .map(store => `
            <div class="card">
              <h4>${store.name}</h4>
              <p>${store.desc}</p>
            </div>
          `)
          .join("");
      });

    // Load dining
    fetch(API_BASE + "/dining")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("dining-list");
        container.innerHTML = data.dining
          .map(place => `
            <div class="card">
              <h4>${place.name}</h4>
              <p>${place.desc}</p>
            </div>
          `)
          .join("");
      });

    // Load cinema
    fetch(API_BASE + "/cinema")
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById("cinema-list");
        list.innerHTML = data.cinema
          .map(show => `<li><strong>${show.movie}</strong> — ${show.time}</li>`)
          .join("");
      });

    // Load offers
    fetch(API_BASE + "/offers")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("offers-list");
        container.innerHTML = data.offers
          .map(offer => `
            <div class="card">
              <h4>${offer.title}</h4>
              <p>Valid: ${offer.valid}</p>
            </div>
          `)
          .join("");
      });
  </script>

</body>
</html>
